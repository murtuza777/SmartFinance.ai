name: Deploy Cloudflare

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci --prefix burryai-worker

      - name: Run worker tests
        run: npm test --prefix burryai-worker

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install worker dependencies
        run: npm ci --prefix burryai-worker

      - name: Deploy Worker + D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          if [ -n "$D1_DATABASE_ID" ]; then
            sed -i "s/\"database_id\": \"[^\"]*\"/\"database_id\": \"$D1_DATABASE_ID\"/" burryai-worker/wrangler.jsonc
          fi

          npx wrangler whoami
          npx wrangler d1 info burryai-db --config burryai-worker/wrangler.jsonc

          npx wrangler d1 migrations apply burryai-db --config burryai-worker/wrangler.jsonc --remote
          npx wrangler secret put JWT_SECRET --config burryai-worker/wrangler.jsonc <<< "$JWT_SECRET"
          if [ -n "$GEMINI_API_KEY" ]; then npx wrangler secret put GEMINI_API_KEY --config burryai-worker/wrangler.jsonc <<< "$GEMINI_API_KEY"; fi
          if [ -n "$TAVILY_API_KEY" ]; then npx wrangler secret put TAVILY_API_KEY --config burryai-worker/wrangler.jsonc <<< "$TAVILY_API_KEY"; fi
          if [ -n "$SERPER_API_KEY" ]; then npx wrangler secret put SERPER_API_KEY --config burryai-worker/wrangler.jsonc <<< "$SERPER_API_KEY"; fi
          npm run deploy:worker

      - name: Deploy Frontend (OpenNext Cloudflare)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_API_BASE_URL: ${{ vars.WORKER_API_BASE_URL }}
          NEXT_PUBLIC_WORKER_API_BASE_URL: ${{ vars.NEXT_PUBLIC_WORKER_API_BASE_URL }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run deploy:cloudflare:web
